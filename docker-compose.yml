services:
  db:
    image: postgres:16
    # Host port 5455 avoids clashing with a locally-running Postgres on 5432.
    ports:
      - "5455:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bball
    # No named volume — this is a throwaway dev/test database.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bball"]
      interval: 3s
      timeout: 3s
      retries: 10

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Service-name DNS on the compose network; container port, not 5455.
      DATABASE_URL: postgresql://postgres:postgres@db:5432/bball
    depends_on:
      db:
        condition: service_healthy
    # init-db + ingest are idempotent, so running them on every startup is safe.
    command: >
      sh -c "uv run --no-sync bball init-db &&
             uv run --no-sync bball ingest all &&
             uv run --no-sync python manage.py runserver 0.0.0.0:8000"
